const N_H = 6, N_D = 17;

// ── Grid Heatmap ──
function rqColor(rq) {
  if (rq <= 0) return '#0d1b2a';
  const t = Math.min(rq / 0.8, 1);
  const r = Math.round(35 + t * 198);
  const g = Math.round(27 + t * 42);
  const b = Math.round(46 + t * 50);
  return `rgb(${r},${g},${b})`;
}

const table = document.getElementById('gridTable');
// Header
let hdr = '<tr><th></th>';
H_LABELS.forEach(l => hdr += `<th>${l}</th>`);
hdr += '</tr>';
table.innerHTML = hdr;

for (let d = 0; d < N_D; d++) {
  let row = `<tr><td class="row-label">${D_LABELS[d]}</td>`;
  for (let h = 0; h < N_H; h++) {
    const cell = GRID.find(c => c.h === h && c.d === d);
    if (cell && cell.has) {
      row += `<td style="background:${rqColor(cell.rq)}" `
           + `data-info="${D_LABELS[d]} | H${h}\nRQ=${cell.rq} p=${cell.p} H=${cell.H}\ngen=${cell.gen}\nQ: ${cell.problem}\nA: ${cell.answer}">`
           + `${cell.rq.toFixed(3)}</td>`;
    } else {
      row += '<td class="empty">·</td>';
    }
  }
  row += '</tr>';
  table.innerHTML += row;
}

const tooltip = document.getElementById('tooltip');
table.addEventListener('mouseover', e => {
  const info = e.target.getAttribute('data-info');
  if (info) {
    tooltip.innerHTML = info.replace(/\n/g, '<br>');
    tooltip.style.display = 'block';
  }
});
table.addEventListener('mousemove', e => {
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
});
table.addEventListener('mouseout', () => tooltip.style.display = 'none');

// ── Charts ──
function drawLineChart(svgId, data, key1, key2, label1, label2) {
  const svg = document.getElementById(svgId);
  if (!data.length) return;
  const W = 600, H = 160, P = 40;
  const n = data.length;
  const max1 = Math.max(...data.map(d => d[key1] || 0), 0.01);
  const max2 = key2 ? Math.max(...data.map(d => d[key2] || 0), 0.01) : max1;
  const maxY = Math.max(max1, max2) * 1.1;

  let html = `<line x1="${P}" y1="${H}" x2="${W}" y2="${H}" stroke="#333" />`;
  // axis labels
  html += `<text x="${P-5}" y="15" fill="#aaa" font-size="10" text-anchor="end">${maxY.toFixed(2)}</text>`;
  html += `<text x="${P-5}" y="${H}" fill="#aaa" font-size="10" text-anchor="end">0</text>`;

  // line 1
  let pts1 = data.map((d, i) => `${P + i * (W-P) / Math.max(n-1,1)},${H - (d[key1]||0)/maxY * H}`).join(' ');
  html += `<polyline points="${pts1}" class="line" />`;
  html += `<text x="${W-60}" y="20" fill="#e94560" font-size="10">${label1}</text>`;

  // line 2
  if (key2) {
    let pts2 = data.map((d, i) => `${P + i * (W-P) / Math.max(n-1,1)},${H - (d[key2]||0)/maxY * H}`).join(' ');
    html += `<polyline points="${pts2}" class="line-max" />`;
    html += `<text x="${W-60}" y="35" fill="#ffd700" font-size="10">${label2}</text>`;
  }

  // dots
  data.forEach((d, i) => {
    const x = P + i * (W-P) / Math.max(n-1,1);
    html += `<circle cx="${x}" cy="${H - (d[key1]||0)/maxY * H}" r="3" fill="#e94560" />`;
  });

  svg.innerHTML = html;
}

drawLineChart('chartRQ', HISTORY, 'mean_rq', 'max_rq', 'Mean R_Q', 'Max R_Q');
drawLineChart('chartCov', HISTORY, 'coverage', null, 'Coverage', '');

  champDiv.innerHTML += `

      ${probHtml}
      <code>${c.source_code||''}</code>
    </div>`;
});
