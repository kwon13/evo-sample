<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5Z" fill="#94a3b8"/></marker>
    <marker id="aG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5Z" fill="#059669"/></marker>
    <marker id="aB" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5Z" fill="#2563eb"/></marker>
  </defs>

  <!-- Canvas -->
  <rect width="960" height="560" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a" letter-spacing="-0.3">R_Q Self-Evolving Pipeline</text>
  <text x="480" y="52" text-anchor="middle" font-size="11" fill="#94a3b8">MAP-Elites program evolution  +  REINFORCE++ solver training  =  online co-evolution</text>

  <!-- ================================================================ -->
  <!-- LEFT PANEL: Solver Training                                      -->
  <!-- ================================================================ -->
  <rect x="24" y="72" width="290" height="460" rx="12" fill="white" stroke="#bfdbfe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="24" y="72" width="290" height="40" rx="12" fill="url(#gB)"/>
  <rect x="24" y="100" width="290" height="12" rx="0" fill="url(#gB)"/>
  <text x="169" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Solver Training (Outer Loop)</text>

  <!-- Step boxes - uniform 250w x 36h, centered at x=169 -->
  <rect x="44" y="126" width="250" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="169" y="149" text-anchor="middle" font-size="11" fill="#1e40af">Dynamic Dataset</text>

  <line x1="169" y1="162" x2="169" y2="176" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="44" y="178" width="250" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="169" y="201" text-anchor="middle" font-size="11" fill="#1e40af">vLLM Rollout (n=4)</text>

  <line x1="169" y1="214" x2="169" y2="228" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="44" y="230" width="250" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="169" y="253" text-anchor="middle" font-size="11" fill="#1e40af">Reward (\boxed{} + SymPy)</text>

  <line x1="169" y1="266" x2="169" y2="280" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="44" y="282" width="250" height="36" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="169" y="305" text-anchor="middle" font-size="11" fill="#1e40af">REINFORCE++ Advantage</text>

  <line x1="169" y1="318" x2="169" y2="332" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="44" y="334" width="250" height="36" rx="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="169" y="357" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Actor Update (FSDP)</text>

  <line x1="169" y1="370" x2="169" y2="384" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="44" y="386" width="250" height="36" rx="7" fill="#f0fdf4" stroke="#86efac"/>
  <text x="169" y="409" text-anchor="middle" font-size="11" fill="#166534">Validation (every 50 steps)</text>

  <rect x="44" y="436" width="250" height="36" rx="7" fill="#fefce8" stroke="#fde68a"/>
  <text x="169" y="453" text-anchor="middle" font-size="10" fill="#854d0e">GSM8K / MATH-500</text>
  <text x="169" y="466" text-anchor="middle" font-size="10" fill="#854d0e">accuracy tracking</text>

  <!-- Repeat label -->
  <text x="169" y="498" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">every step</text>
  <path d="M 90,504 Q 90,520 169,520 Q 248,520 248,504" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ================================================================ -->
  <!-- RIGHT PANEL: Evolution                                           -->
  <!-- ================================================================ -->
  <rect x="340" y="72" width="596" height="460" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="340" y="72" width="596" height="40" rx="12" fill="url(#gA)"/>
  <rect x="340" y="100" width="596" height="12" rx="0" fill="url(#gA)"/>
  <text x="638" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Evolution (Inner Loop, every evolution_freq steps)</text>

  <!-- LEFT COLUMN: 4 phases, uniform 240w x 50h -->
  <rect x="360" y="126" width="240" height="50" rx="7" fill="#fffbeb" stroke="#fde68a"/>
  <text x="480" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Phase 1: LLM Mutation</text>
  <text x="480" y="162" text-anchor="middle" font-size="9.5" fill="#b45309">in-depth 40% | in-breadth 40% | crossover 20%</text>
  <text x="480" y="174" text-anchor="middle" font-size="9" fill="#b45309" opacity="0.7">+ score feedback + few-shot champions</text>

  <line x1="480" y1="176" x2="480" y2="190" stroke="#d97706" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="360" y="192" width="240" height="44" rx="7" fill="#fffbeb" stroke="#fde68a"/>
  <text x="480" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Phase 2: Self-Verify</text>
  <text x="480" y="226" text-anchor="middle" font-size="9.5" fill="#b45309">5-seed exec + SymPy (~30% reject)</text>

  <line x1="480" y1="236" x2="480" y2="250" stroke="#d97706" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="360" y="252" width="240" height="44" rx="7" fill="#fffbeb" stroke="#fde68a"/>
  <text x="480" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Phase 3: H Pre-filter</text>
  <text x="480" y="286" text-anchor="middle" font-size="9.5" fill="#b45309">1 forward pass, DPI (~60% reject)</text>

  <line x1="480" y1="296" x2="480" y2="310" stroke="#d97706" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="360" y="312" width="240" height="44" rx="7" fill="#fffbeb" stroke="#fde68a"/>
  <text x="480" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Phase 4: G Rollouts</text>
  <text x="480" y="346" text-anchor="middle" font-size="9.5" fill="#b45309">G=10 samples -> p_hat</text>

  <!-- RIGHT COLUMN: R_Q + Grid + Refresh, aligned -->
  <!-- R_Q box -->
  <rect x="624" y="126" width="292" height="54" rx="8" fill="url(#gP)" filter="url(#sh)"/>
  <text x="770" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="white">R_Q = p(1-p) . H</text>
  <text x="770" y="168" text-anchor="middle" font-size="10" fill="#ddd6fe">learnability x gradient strength</text>

  <!-- Arrow: Phase4 -> R_Q -->
  <path d="M 600,336 L 622,336 L 622,153 L 622,153" fill="none" stroke="#d97706" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Arrow: R_Q -> Grid -->
  <line x1="770" y1="180" x2="770" y2="198" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MAP-Elites Grid -->
  <rect x="624" y="200" width="292" height="156" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="770" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">MAP-Elites Grid</text>

  <!-- Mini grid: 6 col x 4 row, cell 28x20, gap 2 -->
  <g transform="translate(672, 234)">
    <rect x="0"   y="0" width="28" height="20" rx="3" fill="#d1fae5" stroke="#a7f3d0"/>
    <rect x="30"  y="0" width="28" height="20" rx="3" fill="#6ee7b7" stroke="#34d399"/>
    <rect x="60"  y="0" width="28" height="20" rx="3" fill="#a7f3d0" stroke="#6ee7b7"/>
    <rect x="90"  y="0" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>
    <rect x="120" y="0" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>
    <rect x="150" y="0" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>

    <rect x="0"   y="22" width="28" height="20" rx="3" fill="#a7f3d0" stroke="#6ee7b7"/>
    <rect x="30"  y="22" width="28" height="20" rx="3" fill="#34d399" stroke="#059669"/>
    <rect x="60"  y="22" width="28" height="20" rx="3" fill="#6ee7b7" stroke="#34d399"/>
    <rect x="90"  y="22" width="28" height="20" rx="3" fill="#d1fae5" stroke="#a7f3d0"/>
    <rect x="120" y="22" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>
    <rect x="150" y="22" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>

    <rect x="0"   y="44" width="28" height="20" rx="3" fill="#6ee7b7" stroke="#34d399"/>
    <rect x="30"  y="44" width="28" height="20" rx="3" fill="#a7f3d0" stroke="#6ee7b7"/>
    <rect x="60"  y="44" width="28" height="20" rx="3" fill="#059669" stroke="#047857"/>
    <rect x="90"  y="44" width="28" height="20" rx="3" fill="#6ee7b7" stroke="#34d399"/>
    <rect x="120" y="44" width="28" height="20" rx="3" fill="#34d399" stroke="#059669"/>
    <rect x="150" y="44" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>

    <rect x="0"   y="66" width="28" height="20" rx="3" fill="#d1fae5" stroke="#a7f3d0"/>
    <rect x="30"  y="66" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>
    <rect x="60"  y="66" width="28" height="20" rx="3" fill="#6ee7b7" stroke="#34d399"/>
    <rect x="90"  y="66" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>
    <rect x="120" y="66" width="28" height="20" rx="3" fill="#a7f3d0" stroke="#6ee7b7"/>
    <rect x="150" y="66" width="28" height="20" rx="3" fill="#f0fdf4" stroke="#d1fae5"/>

    <!-- Labels -->
    <text x="-6" y="14" text-anchor="end" font-size="8" fill="#6b7280">H0</text>
    <text x="-6" y="36" text-anchor="end" font-size="8" fill="#6b7280">H1</text>
    <text x="-6" y="58" text-anchor="end" font-size="8" fill="#6b7280">H2</text>
    <text x="-6" y="80" text-anchor="end" font-size="8" fill="#6b7280">H3</text>
    <text x="14"  y="98" text-anchor="middle" font-size="8" fill="#6b7280">D0</text>
    <text x="44"  y="98" text-anchor="middle" font-size="8" fill="#6b7280">D1</text>
    <text x="74"  y="98" text-anchor="middle" font-size="8" fill="#6b7280">D2</text>
    <text x="104" y="98" text-anchor="middle" font-size="8" fill="#6b7280">D3</text>
    <text x="134" y="98" text-anchor="middle" font-size="8" fill="#6b7280">D4</text>
    <text x="164" y="98" text-anchor="middle" font-size="8" fill="#6b7280">D5</text>
  </g>
  <text x="770" y="348" text-anchor="middle" font-size="9" fill="#065f46">H = entropy (difficulty)  |  D = embedding PCA (diversity)</text>

  <!-- Arrow: Grid -> Refresh -->
  <line x1="770" y1="356" x2="770" y2="372" stroke="#059669" stroke-width="1.5" marker-end="url(#aG)"/>

  <!-- Dataset Refresh -->
  <rect x="624" y="374" width="292" height="46" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="770" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Dataset Refresh</text>
  <text x="770" y="411" text-anchor="middle" font-size="10" fill="#059669">champions x 16 seeds -> new training data</text>

  <!-- Repeat label -->
  <text x="480" y="444" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">8 rounds x 8 candidates = 64 attempts (fixed budget)</text>
  <path d="M 380,450 Q 380,466 480,466 Q 580,466 580,450" fill="none" stroke="#fcd34d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ================================================================ -->
  <!-- CO-EVOLUTION ARROWS (between panels)                             -->
  <!-- ================================================================ -->

  <!-- Green: Refresh -> Solver Dataset -->
  <path d="M 624,397 L 320,397 Q 310,397 310,387 L 310,148 L 294,148" fill="none" stroke="#059669" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#aG)"/>
  <rect x="316" y="258" width="20" height="48" rx="4" fill="white" opacity="0.9"/>
  <text x="326" y="288" text-anchor="middle" font-size="8.5" font-weight="600" fill="#059669" transform="rotate(-90,326,288)">new data</text>

  <!-- Blue: Solver -> Evolution -->
  <path d="M 294,357 L 320,357 Q 330,357 330,347 L 330,153 L 358,153" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#aB)"/>
  <rect x="332" y="224" width="20" height="58" rx="4" fill="white" opacity="0.9"/>
  <text x="342" y="260" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2563eb" transform="rotate(-90,342,260)">p_hat shifts</text>

  <!-- ================================================================ -->
  <!-- LEGEND                                                           -->
  <!-- ================================================================ -->
  <rect x="624" y="436" width="292" height="36" rx="7" fill="#f1f5f9" stroke="#e2e8f0"/>
  <circle cx="648" cy="454" r="5" fill="#2563eb"/><text x="658" y="458" font-size="9" fill="#475569">Solver</text>
  <circle cx="708" cy="454" r="5" fill="#d97706"/><text x="718" y="458" font-size="9" fill="#475569">Evolution</text>
  <circle cx="788" cy="454" r="5" fill="#059669"/><text x="798" y="458" font-size="9" fill="#475569">Data</text>
  <circle cx="843" cy="454" r="5" fill="#7c3aed"/><text x="853" y="458" font-size="9" fill="#475569">R_Q Score</text>
</svg>
