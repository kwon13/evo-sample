data:
  train_files: ""
  val_files: ./data/math500_val.parquet
  max_prompt_length: 1024
  max_response_length: 2048
  rollout_batch_size: 32
  val_batch_size: 500
  shuffle: true

algorithm:
  adv_estimator: reinforce_plus_plus
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  use_kl_loss: false

worker:
  hybrid_engine: true
  actor:
    strategy: fsdp
    global_batch_size: 32
    micro_batch_size_per_device_for_update: 2
    micro_batch_size_per_device_for_experience: 2
    use_torch_compile: false
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      torch_dtype: bfloat16
    model:
      model_path: Qwen/Qwen3-4B-Base
      trust_remote_code: true
      enable_gradient_checkpointing: true
    optim:
      lr: 1e-6
      weight_decay: 1e-2
      strategy: adamw
      lr_warmup_ratio: 0.0

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      torch_dtype: bfloat16

  rollout:
    name: vllm
    temperature: 0.7
    max_model_len: 4096
    dtype: bfloat16
    tensor_parallel_size: 1
    enable_chunked_prefill: false
    enforce_eager: false
    n: 1
    gpu_memory_utilization: 0.5
    ignore_eos: false
    disable_log_stats: true

  reward:
    reward_type: batch
    reward_function: ./reward_fn.py:compute_score
    num_cpus: 1

trainer:
  total_epochs: 100
  max_steps: 256
  project_name: rq_evolve
  experiment_name: qwen3_4b_base_rpp
  default_local_dir: ./rq_output/verl_ckpt
  logger:
    - console
    - wandb
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 50
  val_freq: 50
  val_before_train: true
  val_only: false

rq:
  seed_programs_dir: ./seed_programs
  n_h_bins: 6
  n_div_bins: 10
  evolution_pct: 0.1
  candidates_per_evo: 8
  max_rounds: 8
  num_rollouts: 10
  instances_per_program: 16
  crossover_ratio: 0.2
  in_depth_ratio: 0.5
  h_threshold: 0.1
  ucb_c: 1.0
  epsilon: 0.3

  # --- Champion re-evaluation (option A, opt-in) ---
  # 매 evolution step 앞에서 기존 champion 일부의 R_Q 를 현재 solver 로 재측정.
  # Solver 가 마스터한 champion 은 R_Q 가 떨어져 다음 mutation 에 쉽게 대체됨.
  #
  # 기본은 꺼 둠 (0). 아래 조건 중 하나가 관찰되면 양수로 올려 켠다:
  #   - 특정 champion 이 장기간 같은 niche 를 점유 (dataset 이 정체)
  #   - Solver validation acc 가 오르는데 mean_rq 가 변하지 않음 (stale 신호)
  #   - H2+ champion 이 학습 후반부에 계속 재활용됨
  # 권장 시작값: 8 (매 evolution step 당 champion 8개 재평가)
  reeval_per_step: 0                    # 재평가할 champion 수 (0 = 비활성화)
  reeval_age_ratio: 0.7                 # (0~1) age-weighted 비율, 나머지는 랜덤
  reeval_evict_p_hat_range: [0.02, 0.98]  # 이 범위 벗어나는 champion 은 evict

  # --- Training-data selection (H-priority + D-uniform + strict anti-reuse) ---
  # mode:
  #   "h_priority_d_uniform" (default) — H 내림차순 × D 균등 + (program, seed) 재사용 금지
  #   "uniform"                         — 모든 champion × seeds[0, m)  (legacy)
  # training_budget:
  #   epoch 당 총 (problem, answer) 인스턴스 수.
  #   null 이면 n_h_bins × n_div_bins × instances_per_program 로 자동 설정.
  # strict_anti_reuse:
  #   true  (권장) — 같은 (program_id, seed) 쌍은 전체 학습 동안 최대 1회만 노출.
  #                   checkpoint 에 used_seeds dict 를 포함해야 restart 후에도 유지됨.
  #   false        — 한 epoch 안에서만 중복 금지, epoch 간에는 seed 재사용 허용.
  training_selection_mode: "h_priority_d_uniform"
  training_budget: null
  strict_anti_reuse: true
