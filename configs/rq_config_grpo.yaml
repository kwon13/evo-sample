data:
  train_files: ""
  max_prompt_length: 4096
  max_response_length: 4096
  rollout_batch_size: 32
  shuffle: true

algorithm:
  # GRPO: group-relative policy optimization. Samples n rollouts per prompt,
  # standardizes rewards within the group, no critic required.
  # Requires worker.rollout.n > 1 (see ray_trainer.py:251).
  adv_estimator: grpo
  kl_penalty: low_var_kl
  # GRPO 관행: KL term을 actor loss에 포함 + 작은 coefficient.
  # REINFORCE++ 대비 kl_coef를 한 자릿수 낮춤 (GRPO는 ratio clipping이 없으므로
  # KL가 policy drift의 주 안전장치).
  kl_coef: 1.0e-3
  use_kl_loss: true

worker:
  hybrid_engine: true
  actor:
    strategy: fsdp
    global_batch_size: 32
    # n=8 rollouts/prompt → one training step processes 32 × 8 = 256 trajectories.
    # micro_batch_size를 1로 낮춰 GPU 메모리 여유를 확보.
    micro_batch_size_per_device_for_update: 4
    micro_batch_size_per_device_for_experience: 2
    use_torch_compile: false
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      torch_dtype: bfloat16
    model:
      model_path: /data1/yhoon113/qwen3-4b-base
      trust_remote_code: true
      enable_gradient_checkpointing: true
    optim:
      lr: 1e-6
      weight_decay: 1e-2
      strategy: adamw
      lr_warmup_ratio: 0.0

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      torch_dtype: bfloat16

  rollout:
    name: vllm
    temperature: 0.7
    max_model_len: 8192
    max_num_batched_tokens: 8192
    dtype: bfloat16
    tensor_parallel_size: 1
    enable_chunked_prefill: false
    enforce_eager: false
    # G=8 rollouts/prompt for GRPO group. 16이 더 안정적이지만 memory 2배.
    # 본 설정은 Qwen3-4B × 2GPU 환경 기준 보수적 시작점.
    n: 8
    gpu_memory_utilization: 0.5
    ignore_eos: false
    disable_log_stats: true

  reward:
    reward_type: batch
    reward_function: ./reward_fn.py:compute_score
    num_cpus: 1

trainer:
  total_epochs: 100
  max_steps: 256
  project_name: rq_evolve
  experiment_name: qwen3_4b_base_grpo_h_span_max
  default_local_dir: ./rq_output/verl_ckpt_grpo_h_span_max
  logger:
    - console
    - wandb
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: 128      # step 128, 256 저장 → 중간 1회 + final 1회
  save_final_checkpoint: false  # save_freq 배수가 아닌 조기 종료 시 final save 생략
  save_limit: 2       # 최근 2개 checkpoint만 유지 (오래된 것 자동 삭제)

math_eval:
  enabled: true
  before_train: true
  every_n_epochs: 1
  max_tokens: 4096
  temperature: 0.0
  top_p: 1.0
  batch_size: 128
  sample_seed: 42
  output_details: true
  max_logged_failures: 20
  fast_samples:
    math500: 100
    amc23: -1
    aime24: -1
    aime25: -1
    minerva_math: 100
    olympiadbench: 100
  benchmarks:
    - name: math500
      hf_id: test-time-compute/test_MATH
      split: test
    - name: amc23
      hf_id: test-time-compute/test_amc23
      split: test
    - name: aime24
      hf_id: test-time-compute/test_aime24
      split: test
    - name: aime25
      hf_id: test-time-compute/aime_2025
      split: test
    - name: minerva_math
      hf_id: test-time-compute/test_minerva_math
      split: test
    - name: olympiadbench
      hf_id: test-time-compute/test_olympiadbench
      split: test

rq:
  seed_programs_dir: ./seed_programs
  n_h_bins: 10
  # D-axis can be:
  #   concept_group: 6 controlled math categories
  #   concept_type : 15 fine-grained templates
  #   embedding    : legacy sentence-embedding PCA axis
  diversity_axis: concept_group
  n_div_bins: 6
  # H bins are applied to the selected uncertainty_metric. The paper default is
  # token-level entropy, matching the Fisher/gradient derivation. The supported
  # metrics are h and h_span_max.
  h_range: [0.0, 6.0]
  # Evolution now runs once per Solver epoch via _pre_epoch_hook() —
  # evolution_pct / evolution_freq are NOT consulted. Kept here only for
  # backward-compatible YAML parsing; safe to delete.
  evolution_pct: 0.1
  candidates_per_evo: 8
  max_rounds: 8
  # rq.num_rollouts는 R_Q scoring용 rollout 수 (evolution 내부).
  # worker.rollout.n (GRPO group size)과 완전히 독립.
  num_rollouts: 8
  # R_Q uncertainty metric:
  #   h           : mean output-token entropy H
  #   h_span_max : max entropy over output reasoning/sentence spans H_span_max
  uncertainty_metric: h_span_max
  instances_per_program: 16
  crossover_ratio: 0.2
  in_depth_ratio: 0.5
  ucb_c: 1.0
  epsilon: 0.3
  # Non-champion but valid/scored programs are kept as evolution material.
  # Parent selection runs UCB over champion + reservoir material together.
  # Reservoir programs are never used for Solver training unless they later become champions.
  candidate_reservoir_size: 4        # per H/D cell, top-R_Q non-elites retained

  # --- Champion re-evaluation ---
  # Re-evaluate occupied MAP-Elites champions before each Questioner evolution
  # phase under the current Solver. This realizes the self-invalidating archive:
  # mastered champions lose R_Q and are updated or re-binned before
  # new candidates compete with them.
  #
  #   null (default, Method-aligned) — re-evaluate ALL occupied champions
  #       (bounded by n_h_bins × n_div_bins = 100 in current grid).
  #   int > 0                         — partial budget for debugging/ablation;
  #                                     age-weighted + random sampling.
  #   0                               — disable re-evaluation (ablation only).
  #       Stale champions from past Solver states will then compete against
  #       fresh candidates with unfair R_Q — not recommended for training runs.
  reeval_per_step: null
  reeval_age_ratio: 0.7                 # (0~1) age-weighted 비율 (partial 모드에서만 사용)

  # Frontier band for Solver training dataset selection.
  # p_hat IN  (f_low, f_high) → "frontier" champion, eligible for training.
  # p_hat OUT of the band      → still kept in archive as mutation material,
  #                              excluded from training data (R_Q = 0 anyway).
  # reeval does NOT evict extreme-p champions; it only evicts consistently
  # exec-failing ones.
  frontier_p_hat_range: [0.1, 0.9]

  # --- Training-data selection (H-priority + D-uniform + strict anti-reuse) ---
  # mode:
  #   "h_priority_d_uniform" (default) — H 내림차순 × D 균등 + (program, seed) 재사용 금지
  #   "uniform"                         — 모든 champion × seeds[0, m)  (legacy)
  # training_budget:
  #   epoch 당 총 (problem, answer) 인스턴스 수.
  #   null 이면 n_h_bins × n_div_bins × instances_per_program 로 자동 설정.
  # strict_anti_reuse:
  #   true  (권장) — 같은 (program_id, seed) 쌍은 전체 학습 동안 최대 1회만
  #                   노출. used_seeds 는 RQEvolveTrainer._save_checkpoint /
  #                   _load_checkpoint 가 JSON sidecar (rq_used_seeds.json)
  #                   로 저장/복원하므로 restart 후에도 유지됨.
  #   false        — _refresh_dataset 시작 시 used_seeds 가 초기화되어 한
  #                   epoch 안에서만 중복 금지. epoch 간에는 같은
  #                   (program_id, seed) 쌍이 재사용될 수 있음.
  training_selection_mode: "h_priority_d_uniform"
  training_budget: null
  strict_anti_reuse: true

  # --- Epoch-start evolution hook (Method epoch order) ---
  # Evolution runs at the beginning of each Solver epoch via _pre_epoch_hook().
  # Method's order: archive reevaluation → mutation rounds → dataset refresh →
  # Solver epoch training. Controlled here:
  #
  # evolve_before_train:
  #   true (default) — run evolution at epoch 0 too (first Solver update
  #                    trains on archive-selected problems, not bootstrap seeds).
  #   false          — skip only the epoch-0 evolution; remaining epochs still
  #                    run evolution normally.
  # skip_initial_evolution_on_resume:
  #   true (default) — when trainer.load_checkpoint_path is set, skip the
  #                    epoch-0 evolution. Safe default because the archive state
  #                    is not part of the checkpoint — we don't want to evolve
  #                    on an unknown archive snapshot.
  #   false          — evolve at epoch 0 even on resume. Checkpoint is already
  #                    loaded by fit() at that point, so this scores the archive
  #                    with the checkpointed policy (not the base model).
  evolve_before_train: true
  skip_initial_evolution_on_resume: true
