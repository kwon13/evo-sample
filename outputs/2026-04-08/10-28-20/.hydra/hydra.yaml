hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - actor_rollout_ref.model.path=Qwen/Qwen3-8B-Base
    - actor_rollout_ref.actor.strategy=fsdp
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.actor.ppo_mini_batch_size=64
    - actor_rollout_ref.actor.ppo_micro_batch_size=4
    - actor_rollout_ref.actor.fsdp_config.dtype=bfloat16
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.tensor_model_parallel_size=2
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.5
    - actor_rollout_ref.rollout.n=10
    - actor_rollout_ref.rollout.temperature=0.7
    - actor_rollout_ref.rollout.max_tokens=8192
    - algorithm.adv_estimator=reinforce_plus_plus
    - algorithm.gamma=1.0
    - data.train_batch_size=256
    - data.max_prompt_length=4096
    - data.max_response_length=8192
    - trainer.total_epochs=1
    - trainer.total_training_steps=256
    - trainer.nnodes=1
    - trainer.n_gpus_per_node=4
    - trainer.save_freq=50
    - trainer.test_freq=50
    - trainer.project_name=rq_evolve
    - trainer.experiment_name=qwen3_8b_base_rpp
    - trainer.default_local_dir=./rq_output/verl_ckpt
    - rq.seed_programs_dir=./seed_programs
    - rq.n_h_bins=6
    - rq.evolution_pct=0.1
    - rq.target_hard_champions=6
    - rq.max_evo_attempts=64
    - rq.candidates_per_evo=8
    - rq.num_rollouts=10
    - rq.instances_per_program=3
    - rq.crossover_ratio=0.2
    - rq.in_depth_ratio=0.5
    - rq.h_threshold=0.1
    - rq.ucb_c=1.0
  job:
    name: run_verl
    chdir: null
    override_dirname: actor_rollout_ref.actor.fsdp_config.dtype=bfloat16,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size=4,actor_rollout_ref.actor.ppo_mini_batch_size=64,actor_rollout_ref.actor.strategy=fsdp,actor_rollout_ref.model.path=Qwen/Qwen3-8B-Base,actor_rollout_ref.rollout.gpu_memory_utilization=0.5,actor_rollout_ref.rollout.max_tokens=8192,actor_rollout_ref.rollout.n=10,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.temperature=0.7,actor_rollout_ref.rollout.tensor_model_parallel_size=2,algorithm.adv_estimator=reinforce_plus_plus,algorithm.gamma=1.0,data.max_prompt_length=4096,data.max_response_length=8192,data.train_batch_size=256,rq.candidates_per_evo=8,rq.crossover_ratio=0.2,rq.evolution_pct=0.1,rq.h_threshold=0.1,rq.in_depth_ratio=0.5,rq.instances_per_program=3,rq.max_evo_attempts=64,rq.n_h_bins=6,rq.num_rollouts=10,rq.seed_programs_dir=./seed_programs,rq.target_hard_champions=6,rq.ucb_c=1.0,trainer.default_local_dir=./rq_output/verl_ckpt,trainer.experiment_name=qwen3_8b_base_rpp,trainer.n_gpus_per_node=4,trainer.nnodes=1,trainer.project_name=rq_evolve,trainer.save_freq=50,trainer.test_freq=50,trainer.total_epochs=1,trainer.total_training_steps=256
    id: ???
    num: ???
    config_name: rq_ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data/kwon113/evo-sample
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/kwon113/evo-sample/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/kwon113/evo-sample/outputs/2026-04-08/10-28-20
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward: reward
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      data: legacy_data
      model_engine: dp
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
